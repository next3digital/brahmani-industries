<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Precision Manufacturing</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --primary: #ffffff;
            --secondary: #ffd49b;
            --text-light: #f8f8f8;
            --text-dark: #333333;
            --bg-light: #000000; /* Set background to black */
            --form-bg: rgba(255, 255, 255, 0.1); /* Slightly transparent for cards */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            color: var(--text-light);
            line-height: 1.6;
            background-color: var(--bg-light);
            padding: 0 5%;
        }

        .hero {
            height: 60vh;
            background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.3)),
                url('https://images.unsplash.com/photo-1517245386807-bb43f82c33c4?ixlib=rb-4.0.3&auto=format&fit=crop&w=1470&q=80') no-repeat center center/cover;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .hero h1 {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            color: var(--text-light);
        }

        .thank-you-message {
            text-align: center;
            margin: 3rem 0;
            font-size: 1.5rem;
            color: var(--primary);
        }

        .contact-info {
            display: flex;
            flex-direction: column;
            gap: 2rem;
            margin: 2rem 0;
        }

        .info-card {
            background: var(--form-bg);
            border-radius: 10px;
            padding: 2rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .info-card h3 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            color: var(--primary);
        }

        .info-item {
            display: flex;
            align-items: center;
            margin-bottom: 1rem;
        }

        .info-icon {
            font-size: 1.5rem;
            color: var(--secondary);
            margin-right: 1rem;
        }

        .info-text {
            flex: 1;
        }

        .info-text a {
            color: var(--text-light);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .info-text a:hover {
            color: var(--secondary);
        }

        .map-container {
            margin-top: 2rem;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .map-container iframe {
            width: 100%;
            height: 300px;
            border: none;
        }

        .social-links {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
        }

        .social-link {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: var(--secondary);
            color: var(--primary);
            transition: all 0.3s ease;
        }

        .social-link:hover {
            background-color: var(--primary);
            color: var(--secondary);
        }

        @media (max-width: 768px) {
            .contact-info {
                padding: 2rem;
            }
        }
    </style>
</head>

<body>
    <section class="hero">
        <h1>Get In Touch</h1>
    </section>

    <div class="thank-you-message">
        <p>Thank you for reaching out! We appreciate your interest and will get back to you shortly.</p>
    </div>

    <div class="contact-info">
        <div class="info-card">
            <h3>Contact Information</h3>
            <div class="info-item">
                <i class="fas fa-map-marker-alt info-icon"></i>
                <div class="info-text">
                    <p>21, Ganga Estate, Naroda, Near Kutch Kadva Patel, Ahmedabad, Gujarat 382330</p>
                </div>
            </div>
            <div class="info-item">
                <i class="fas fa-phone info-icon"></i>
                <div class="info-text">
                    <p><a href="tel:+919924126071">+91 992-412-6071</a></p>
                </div>
            </div>
            <div class="info-item">
                <i class="fas fa-envelope info-icon"></i>
                <div class="info-text">
                    <p><a href="mailto:bhramhaniindustaries@gmail.com">bhramhaniindustaries4@gmail.com</a></p>
                </div>
            </div>
        </div>
        <div class="map-container">
            <iframe
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3672.009144645812!2d72.6678590751952!3d23.02434977917195!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x395e870f3f3f3f3f%3A0x123456789abcdef!2sBrahmani%20Industries%2C%20Ganga%20Estate%2C%20Naroda%2C%20Ahmedabad%2C%20Gujarat%20382330!5e0!3m2!1sen!2sin!4v1719320000000!5m2!1sen!2sin"
                width="100%" height="400" style="border:0;" allowfullscreen="" loading="lazy"
                referrerpolicy="no-referrer-when-downgrade">
            </iframe>
        </div>
        <div class="social-links">
            <a href="https://www.facebook.com/profile.php?id=61570712753505" class="social-link"><i class="fab fa-facebook-f"></i></a>
            <a href="https://x.com/_bm_industries?s=21" class="social-link"><i class="fab fa-twitter"></i></a>
            <a href="https://www.linkedin.com/in/brahmani-industries/" class="social-link"><i class="fab fa-linkedin-in"></i></a>

            <a href="https://www.instagram.com/brahmaniindustries" class="social-link"><i class="fab fa-instagram"></i></a>
        </div>
    </div>

</body>

</html>
