<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Precision Manufacturing Solutions</title>
    <style>
        :root {
            --primary: #000000;
            --secondary: #ffd49b;
            --text-light: #f8f8f8;
            --text-dark: #333333;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            overflow-x: hidden;
            color: var(--text-dark);
            line-height: 1.6;
        }
        
        header {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 1.5rem 5%;
            background-color: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            transition: all 0.3s ease;
        }
        
        .nav-logo {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--secondary);
            text-decoration: none;
            letter-spacing: 1px;
        }
        
        .nav-links {
            display: flex;
            gap: 2rem;
        }
        
        .nav-links a {
            color: var(--text-light);
            text-decoration: none;
            font-weight: 500;
            position: relative;
            transition: color 0.3s ease;
        }
        
        .nav-links a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            background-color: var(--secondary);
            bottom: -5px;
            left: 0;
            transition: width 0.3s ease;
        }
        
        .nav-links a:hover {
            color: var(--secondary);
        }
        
        .nav-links a:hover::after {
            width: 100%;
        }
        
        .hero {
            height: 100vh;
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.3)), 
                        url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=1472&q=80') no-repeat center center/cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 2rem;
            color: var(--text-light);
        }
        
        .hero-content {
            max-width: 800px;
            animation: fadeIn 1.5s ease;
        }
        
        .tagline {
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            line-height: 1.2;
        }
        
        .tagline span {
            color: var(--secondary);
        }
        
        .intro {
            font-size: 1.2rem;
            margin-bottom: 2.5rem;
            opacity: 0.9;
        }
        
        .cta-button {
            display: inline-block;
            background-color: var(--secondary);
            color: var(--primary);
            padding: 0.8rem 2.5rem;
            border-radius: 50px;
            font-weight: 600;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        
        .cta-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
            background-color: var(--text-light);
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* Responsive adjustments */
        @media (max-width: 768px) {
            header {
                padding: 1rem 2rem;
            }
            
            .nav-links {
                gap: 1rem;
            }
            
            .tagline {
                font-size: 2.5rem;
            }
            
            .intro {
                font-size: 1rem;
            }
        }
        
        @media (max-width: 480px) {
            .tagline {
                font-size: 2rem;
            }
            
            .nav-logo {
                font-size: 1.4rem;
            }
            
            .nav-links {
                gap: 0.8rem;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <a href="#" class="nav-logo">PrecisionMfg</a>
        <nav class="nav-links">
            <a href="#about">About</a>
            <a href="#products">Products</a>
            <a href="#process">Process</a>
            <a href="#contact">Contact</a>
        </nav>
    </header>
    
    <section class="hero">
        <div class="hero-content">
            <h1 class="tagline">Innovative Manufacturing <span>Perfected</span></h1>
            <p class="intro">
                For over 20 years, we've been delivering precision-engineered solutions that drive industries forward. 
                Our commitment to quality and innovation sets us apart in the manufacturing world.
            </p>
            <a href="#contact" class="cta-button">Request a Quote</a>
        </div>
    </section>

    <script>
        // Smooth scrolling for navigation links
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                
                const targetId = this.getAttribute('href');
                if (targetId === '#') return;
                
                const targetElement = document.querySelector(targetId);
                if (targetElement) {
                    window.scrollTo({
                        top: targetElement.offsetTop - 80,
                        behavior: 'smooth'
                    });
                }
            });
        });
        
        // Header scroll effect
        window.addEventListener('scroll', () => {
            const header = document.querySelector('header');
            if (window.scrollY > 50) {
                header.style.background = 'rgba(0, 0, 0, 0.95)';
                header.style.padding = '1rem 5%';
            } else {
                header.style.background = 'rgba(0, 0, 0, 0.9)';
                header.style.padding = '1.5rem 5%';
            }
        });
    </script>
</body>
</html>
